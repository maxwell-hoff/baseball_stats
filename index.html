<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB At-Bat Dashboard</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    background:#f5f6f8;color:#1a1a2e;padding:28px 32px;
  }

  /* ── Header ────────────────────────────────────────────────── */
  .header{margin-bottom:20px}
  .header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
  .header .meta{font-size:13px;color:#6b7280;margin-top:4px}

  /* ── Controls ──────────────────────────────────────────────── */
  .controls{
    display:flex;flex-wrap:wrap;gap:14px;align-items:center;
    margin-bottom:16px;
  }
  .search{
    padding:7px 12px;border:1px solid #d1d5db;border-radius:6px;
    font-size:14px;width:260px;outline:none;transition:border .15s;
    margin-left:auto;
  }
  .search:focus{border-color:#6366f1}
  .min-pa-wrap{display:flex;align-items:center;gap:6px;font-size:13px;color:#4b5563}
  .min-pa{
    width:64px;padding:6px 8px;border:1px solid #d1d5db;border-radius:6px;
    font-size:13px;text-align:center;outline:none;
  }
  .player-count{font-size:13px;color:#6b7280}

  /* ── Chart zoom bar ─────────────────────────────────────────── */
  .chart-zoom-bar{
    display:flex;justify-content:flex-end;
    margin-bottom:6px;
  }

  /* zoom controls */
  .zoom-wrap{display:flex;align-items:center;gap:4px;font-size:13px;color:#4b5563}
  .zoom-btn{
    width:28px;height:28px;border:1px solid #d1d5db;border-radius:6px;
    background:#fff;font-size:16px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .12s;user-select:none;
  }
  .zoom-btn:hover{background:#f3f4f6}
  .zoom-btn:active{background:#e5e7eb}
  .zoom-label{font-size:12px;min-width:28px;text-align:center;font-variant-numeric:tabular-nums}

  /* mode / year / PA selectors */
  .mode-select{
    padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;
    font-size:13px;background:#fff;outline:none;cursor:pointer;
  }
  .year-btns{display:flex;gap:4px}
  .year-btn{
    padding:5px 10px;border:1px solid #d1d5db;border-radius:6px;
    font-size:12px;font-weight:500;background:#fff;cursor:pointer;
    transition:all .12s;user-select:none;
  }
  .year-btn.active{background:#6366f1;color:#fff;border-color:#6366f1}
  .hidden{display:none !important}

  /* ── Legend ─────────────────────────────────────────────────── */
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:18px;font-size:12px;color:#4b5563}
  .legend-item{display:flex;align-items:center;gap:4px}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

  /* ── Table ──────────────────────────────────────────────────── */
  .table-wrap{
    background:#fff;border-radius:10px;
    box-shadow:0 1px 3px rgba(0,0,0,.08);overflow-x:auto;
  }
  table{width:100%;border-collapse:collapse;min-width:960px}
  thead th{
    position:sticky;top:0;z-index:2;
    background:#f9fafb;padding:10px 14px;text-align:left;
    font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
    color:#6b7280;border-bottom:2px solid #e5e7eb;cursor:pointer;user-select:none;
    white-space:nowrap;
  }
  thead th:hover{color:#1a1a2e}
  thead th .arrow{font-size:10px;margin-left:3px;opacity:.5}
  thead th.active .arrow{opacity:1;color:#6366f1}
  tbody td{padding:6px 14px;border-bottom:1px solid #f3f4f6;font-size:14px;vertical-align:middle}
  tbody tr:hover{background:#fafaff}
  .col-rank{width:44px;color:#9ca3af;text-align:right;font-variant-numeric:tabular-nums}
  .col-name{width:180px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .col-team{width:52px;font-size:12px;color:#6b7280;text-align:center}
  .col-num{width:62px;text-align:right;font-variant-numeric:tabular-nums}
  .col-chart{min-width:500px;padding:4px 10px !important}
  .col-chart canvas{display:block;width:100%;height:90px}

  /* ── Team expand/collapse ────────────────────────────────────── */
  .team-row{cursor:pointer}
  .team-row:hover{background:#f0f0ff !important}
  .expand-arrow{
    display:inline-block;width:14px;font-size:9px;
    transition:transform .15s;text-align:center;color:#9ca3af;
  }
  .expand-arrow.open{transform:rotate(90deg)}
  .section-row{cursor:pointer}
  .section-row:hover{background:#f0f0ff !important}
  .section-row td{background:#f4f5f7;border-bottom:1px solid #e5e7eb}
  .section-row .col-name{padding-left:28px !important;font-weight:600;font-size:13px}
  .section-row .col-rank{color:transparent}
  .player-subrow td{background:#fafbfc;border-bottom:1px solid #eef0f2}
  .player-subrow .col-name{padding-left:46px !important;font-weight:400;font-size:13px}
  .player-subrow .col-rank{color:transparent}

  /* ── Tooltip ────────────────────────────────────────────────── */
  #tooltip{
    position:fixed;pointer-events:none;z-index:100;
    background:#1e1e2f;color:#f0f0f0;padding:6px 10px;border-radius:6px;
    font-size:12px;line-height:1.4;white-space:nowrap;
    box-shadow:0 4px 12px rgba(0,0,0,.25);opacity:0;transition:opacity .1s;
  }

  .msg{text-align:center;padding:60px 20px;color:#6b7280;font-size:15px}
  .msg.error{color:#dc2626}
</style>
</head>
<body>

<div class="header">
  <h1>MLB Plate Appearance Dashboard</h1>
  <div class="meta">
    <span id="season"></span>
    &nbsp;·&nbsp; <span id="updated"></span>
    &nbsp;·&nbsp; Run values = wOBA linear weights (<span id="wt-year"></span>)
  </div>
</div>

<div class="controls">
  <select class="mode-select" id="groupBy">
    <option value="player">By Player</option>
    <option value="team-asis" selected>By Team – As-is</option>
    <option value="team-aswas">By Team – As-was</option>
  </select>

  <select class="mode-select" id="mode">
    <option value="season">By Season</option>
    <option value="rolling-season">Rolling Average – Season (~6,000 PA/team, ~600 PA/player)</option>
    <option value="rolling-month">Rolling Average – Month (~1,000 PA/team, ~60 PA/player)</option>
  </select>

  <select class="mode-select" id="playerType">
    <option value="batter" selected>Batters</option>
    <option value="pitcher">Pitchers</option>
    <option value="all">All Players</option>
  </select>

  <div class="year-btns" id="yearBtns"></div>

  <div class="min-pa-wrap">
    Min PA: <input class="min-pa" id="minPA" type="number" value="60" min="1" step="1">
  </div>
  <div class="player-count" id="count"></div>
  <input class="search" id="search" type="text" placeholder="Search team…">
</div>

<div class="legend" id="legend"></div>

<div class="chart-zoom-bar">
  <div class="zoom-wrap">
    Chart:
    <button class="zoom-btn" id="zoomOut">−</button>
    <span class="zoom-label" id="zoomLabel">1x</span>
    <button class="zoom-btn" id="zoomIn">+</button>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr id="thead-row">
        <th class="col-rank">#</th>
        <th class="col-name" data-key="name">Player <span class="arrow"></span></th>
        <th class="col-team">Team</th>
        <th class="col-num" data-key="net_wrc_plus">Net wRC+ <span class="arrow"></span></th>
        <th class="col-num" data-key="wrc_plus">wRC+ <span class="arrow"></span></th>
        <th class="col-num" data-key="owrc_plus">oWRC+ <span class="arrow"></span></th>
        <th class="col-num" data-key="xwoba">xwOBA <span class="arrow"></span></th>
        <th class="col-num" data-key="pa">PA <span class="arrow"></span></th>
        <th class="col-num" data-key="bsr">BsR <span class="arrow"></span></th>
        <th class="col-chart">Plate Appearance Run Values</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="tooltip"></div>

<script>
/* ================================================================
   CONFIG
   ================================================================ */
const EVENT_COLORS = {
  home_run:     '#ef4444',
  triple:       '#f97316',
  double:       '#eab308',
  single:       '#22c55e',
  walk:         '#3b82f6',
  intent_walk:  '#3b82f6',
  hit_by_pitch: '#a855f7',
  stolen_base:  '#10b981',
  caught_stealing: '#dc2626',
};
const OUT_COLOR = '#1c1c1f';
const Y_MAX_DEFAULT = 2.037;
let yMax = Y_MAX_DEFAULT;
const WRC_PLUS_MIN = 0;
const WRC_PLUS_MAX = 250;
const WRC_LINE_COLOR = '#6366f1';
const OWRC_LINE_COLOR = '#e11d48';
const XWOBA_LINE_COLOR = '#14b8a6';
const WRC_LINE_MIN_PA = 10;

const HIT_EVENTS = new Set(['single','double','triple','home_run']);
const WALK_EVENTS = new Set(['walk','intent_walk']);
const WOBA_DENOM_EXCLUDE = new Set([
  'intent_walk','sac_bunt','sac_bunt_double_play','catcher_interf',
]);
const round3 = v => Math.round(v * 1000) / 1000;
const NOT_BATTED_BALL = new Set([
  'strikeout','strikeout_double_play','walk','intent_walk',
  'hit_by_pitch','home_run','catcher_interf',
]);

const LEGEND_ITEMS = [
  ['HR',  EVENT_COLORS.home_run],
  ['3B',  EVENT_COLORS.triple],
  ['2B',  EVENT_COLORS.double],
  ['1B',  EVENT_COLORS.single],
  ['BB',  EVENT_COLORS.walk],
  ['HBP', EVENT_COLORS.hit_by_pitch],
  ['Out', OUT_COLOR],
  ['wRC+', WRC_LINE_COLOR],
  ['oWRC+', OWRC_LINE_COLOR],
  ['xwOBA', XWOBA_LINE_COLOR],
];

/* ================================================================
   STATE
   ================================================================ */
let DATA = null;
let sort = { key: 'wrc_plus', dir: 'desc' };
let compressedX = null; // compressed x-scale function (skips offseason)
const canvasMap = new Map();
const pointsMap = new Map();
const lineMap = new Map();
const xLineMap = new Map();

let viewMode = 'season';        // 'season' | 'pa'
let selectedYears = new Set();   // for season mode
let paWindowKey = 'season';      // 'season' | 'month'
let chartZoom = 1;               // 1x, 2x, 4x, 8x
const ZOOM_STEPS = [1, 2, 4, 8];
let groupBy = 'team-asis';       // 'player' | 'team-asis' | 'team-aswas'
let chartType = 'bar';           // 'scatter' | 'bar'
let playerTypeFilter = 'batter'; // 'batter' | 'pitcher' | 'all'
const expandedTeams = new Set();
const expandedSections = new Set();

const PA_WINDOWS = {
  season: { team: 6000, player: 600 },
  month:  { team: 1000, player: 60 },
};

// Current league constants (set from most recent selected year)
let curLC = { lgwOBA: 0.313, wOBAScale: 1.232, lgRPA: 0.118 };

// Park factors: { All: {team: pf}, L: {team: pf}, R: {team: pf} }
let PARK_FACTORS = null;

/* ================================================================
   BOOT
   ================================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  buildLegend();
  try {
    const resp = await fetch('data/player_data.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();
  } catch (e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="10" class="msg error">
         Could not load data/player_data.json — run <code>python fetch_data.py</code> first.
       </td></tr>`;
    return;
  }

  try {
    const pfResp = await fetch('data/park_factors.json');
    if (pfResp.ok) PARK_FACTORS = await pfResp.json();
  } catch (_) { /* park factors optional */ }

  const years = DATA.years_available;
  document.getElementById('season').textContent = years.join(', ') + ' Season' + (years.length > 1 ? 's' : '');
  document.getElementById('updated').textContent =
    'Updated ' + new Date(DATA.last_updated).toLocaleString();
  document.getElementById('wt-year').textContent = years[years.length - 1];

  // Default: most recent year selected
  selectedYears = new Set([years[years.length - 1]]);
  buildYearButtons(years);
  syncLC();
  bindControls();
  render();
});

function syncLC() {
  // Use league constants from most recent selected year (or most recent available)
  const years = DATA.years_available;
  let best;
  if (viewMode === 'season') {
    best = Math.max(...selectedYears);
  } else {
    best = years[years.length - 1];
  }
  const key = String(best);
  if (DATA.league_constants[key]) {
    curLC = DATA.league_constants[key];
  }
}

function getParkFactor(stadium, hand) {
  if (!PARK_FACTORS || !stadium) return 1.0;
  if (hand && PARK_FACTORS[hand] && PARK_FACTORS[hand][stadium] != null) {
    return PARK_FACTORS[hand][stadium] / 100;
  }
  if (PARK_FACTORS.All && PARK_FACTORS.All[stadium] != null) {
    return PARK_FACTORS.All[stadium] / 100;
  }
  return 1.0;
}

/* ================================================================
   YEAR BUTTONS
   ================================================================ */
function buildYearButtons(years) {
  const wrap = document.getElementById('yearBtns');
  wrap.innerHTML = '';
  for (const y of years) {
    const btn = document.createElement('button');
    btn.className = 'year-btn' + (selectedYears.has(y) ? ' active' : '');
    btn.dataset.year = y;
    btn.textContent = y;
    btn.addEventListener('click', () => {
      if (selectedYears.has(y) && selectedYears.size > 1) {
        selectedYears.delete(y);
        btn.classList.remove('active');
      } else {
        selectedYears.add(y);
        btn.classList.add('active');
      }
      syncLC();
      render();
    });
    wrap.appendChild(btn);
  }
}

/* ================================================================
   LEGEND
   ================================================================ */
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = LEGEND_ITEMS.map(([label, color]) => {
    if (label === 'wRC+' || label === 'oWRC+') {
      return `<div class="legend-item"><span style="width:16px;height:2px;background:${color};border-radius:1px"></span>${label}</div>`;
    }
    return `<div class="legend-item"><span class="dot" style="background:${color}"></span>${label}</div>`;
  }).join('');
}

/* ================================================================
   CONTROLS
   ================================================================ */
function bindControls() {
  document.getElementById('search').addEventListener('input', render);
  document.getElementById('minPA').addEventListener('input', render);

  document.getElementById('groupBy').addEventListener('change', e => {
    groupBy = e.target.value;
    document.getElementById('search').placeholder =
      groupBy.startsWith('team') ? 'Search team…' : 'Search player…';
    expandedTeams.clear();
    expandedSections.clear();
    render();
  });

  document.getElementById('playerType').addEventListener('change', e => {
    playerTypeFilter = e.target.value;
    if (playerTypeFilter === 'pitcher' && sort.key === 'wrc_plus') sort.key = 'owrc_plus';
    else if (playerTypeFilter !== 'pitcher' && sort.key === 'owrc_plus') sort.key = 'wrc_plus';
    render();
  });

  document.getElementById('mode').addEventListener('change', e => {
    const val = e.target.value;
    if (val === 'season') {
      viewMode = 'season';
    } else {
      viewMode = 'pa';
      paWindowKey = val === 'rolling-season' ? 'season' : 'month';
    }
    document.getElementById('yearBtns').classList.toggle('hidden', viewMode !== 'season');
    syncLC();
    render();
  });

  document.getElementById('zoomIn').addEventListener('click', () => {
    const idx = ZOOM_STEPS.indexOf(chartZoom);
    if (idx < ZOOM_STEPS.length - 1) { chartZoom = ZOOM_STEPS[idx + 1]; applyZoom(); }
  });
  document.getElementById('zoomOut').addEventListener('click', () => {
    const idx = ZOOM_STEPS.indexOf(chartZoom);
    if (idx > 0) { chartZoom = ZOOM_STEPS[idx - 1]; applyZoom(); }
  });

  document.querySelectorAll('#thead-row th[data-key]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (sort.key === key) {
        sort.dir = sort.dir === 'desc' ? 'asc' : 'desc';
      } else {
        sort.key = key;
        sort.dir = key === 'name' ? 'asc' : 'desc';
      }
      render();
    });
  });
}

/* ================================================================
   EVENT FILTERING & STAT COMPUTATION
   ================================================================ */
function getEventsForEntity(entity, paCount) {
  if (viewMode === 'season') {
    const evts = entity.events.filter(e => selectedYears.has(parseInt(e[0].substring(0, 4))));
    return { display: evts, stats: evts };
  }
  return { display: entity.events, stats: entity.events.slice(-paCount) };
}

function buildTeamRows(mode) {
  const batters = DATA.players.filter(p => (p.playerType || 'batter') === 'batter');
  const pitchers = DATA.players.filter(p => (p.playerType || 'batter') === 'pitcher');
  const teams = new Map();

  function ensureTeam(abbr) {
    if (!teams.has(abbr)) teams.set(abbr, {
      name: abbr, team: abbr,
      battingEvents: [], pitchingEvents: [], baserunningEvents: [], events: [],
      bsr: 0, sb: 0, cs: 0, def_runs: 0, playerType: 'team',
    });
    return teams.get(abbr);
  }

  if (mode === 'team-asis') {
    for (const p of batters) {
      const abbr = p.team;
      if (!abbr) continue;
      const t = ensureTeam(abbr);
      for (const e of p.events) t.battingEvents.push(e);
      for (const e of (p.baserunning_events ?? [])) t.baserunningEvents.push(e);
      t.bsr += (p.bsr ?? 0); t.sb += (p.sb ?? 0); t.cs += (p.cs ?? 0);
      t.def_runs += (p.def_runs ?? 0);
    }
    for (const p of pitchers) {
      const abbr = p.team;
      if (!abbr) continue;
      const t = ensureTeam(abbr);
      for (const e of p.events) t.pitchingEvents.push(e);
    }
  } else {
    const playerTeamBsr = new Map();
    for (const p of batters) {
      for (const e of p.events) {
        const abbr = e[4];
        if (!abbr) continue;
        ensureTeam(abbr).battingEvents.push(e);
      }
      const key = `${p.name}_${p.team}`;
      if (!playerTeamBsr.has(key)) {
        playerTeamBsr.set(key, true);
        const abbr = p.team;
        if (abbr && teams.has(abbr)) {
          teams.get(abbr).bsr += (p.bsr ?? 0);
          teams.get(abbr).sb += (p.sb ?? 0);
          teams.get(abbr).cs += (p.cs ?? 0);
          teams.get(abbr).def_runs += (p.def_runs ?? 0);
          for (const e of (p.baserunning_events ?? [])) teams.get(abbr).baserunningEvents.push(e);
        }
      }
    }
    for (const p of pitchers) {
      for (const e of p.events) {
        const abbr = e[4];
        if (!abbr) continue;
        ensureTeam(abbr).pitchingEvents.push(e);
      }
    }
  }

  const evtSort = (a, b) => a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : a[3] - b[3];
  for (const t of teams.values()) {
    t.battingEvents.sort(evtSort);
    t.pitchingEvents.sort(evtSort);
    t.baserunningEvents = t.baserunningEvents.map(e =>
      [e[0], e[1], round3(curLC.lgwOBA + e[2]), e[3], e[4], e[5], e[6], e[7]]);
    t.baserunningEvents.sort(evtSort);
    t.fieldingEvents = [];
    for (const e of t.pitchingEvents) {
      const [date, evt, rv, abNum, team, xw, stadium, hand] = e;
      if (NOT_BATTED_BALL.has(evt) || xw == null) continue;
      const fldRv = round3(curLC.lgwOBA + (xw - rv));
      t.fieldingEvents.push([date, evt, fldRv, abNum, team, null, stadium, hand]);
    }
    t.fieldingEvents.sort(evtSort);
    t.events = t.battingEvents;
    t.bsr = Math.round(t.bsr * 10) / 10;
    t.def_runs = Math.round(t.def_runs * 10) / 10;
  }

  return [...teams.values()];
}

function getPlayersForTeam(teamAbbr, type) {
  const typedPlayers = DATA.players.filter(p => (p.playerType || 'batter') === type);
  if (groupBy === 'team-asis') {
    return typedPlayers.filter(p => p.team === teamAbbr);
  }
  const result = [];
  for (const p of typedPlayers) {
    const teamEvents = p.events.filter(e => e[4] === teamAbbr);
    if (teamEvents.length > 0) {
      result.push({ ...p, events: teamEvents });
    }
  }
  return result;
}

function computeStats(events, isPitcher) {
  let pa = 0, hits = 0, walks = 0, wobaN = 0, wobaD = 0;
  let xwobaN = 0, xwobaD = 0;
  let pfSum = 0, pfCount = 0;
  for (const e of events) {
    const [, evt, rv, , , xw, stadium, hand] = e;
    pa++;
    if (HIT_EVENTS.has(evt)) hits++;
    if (WALK_EVENTS.has(evt)) walks++;
    wobaN += rv;
    pfSum += getParkFactor(stadium, hand);
    pfCount++;
    if (!WOBA_DENOM_EXCLUDE.has(evt)) {
      wobaD++;
      xwobaD++;
      xwobaN += (xw != null) ? xw : rv;
    }
  }
  const woba = wobaD > 0 ? wobaN / wobaD : 0;
  const wraaPerPa = (woba - curLC.lgwOBA) / curLC.wOBAScale;
  const meanPF = pfCount > 0 ? pfSum / pfCount : 1.0;
  let wrc_plus = Math.round(
    ((wraaPerPa + curLC.lgRPA + (curLC.lgRPA - meanPF * curLC.lgRPA)) / curLC.lgRPA) * 100
  );
  if (isPitcher) wrc_plus = 200 - wrc_plus;
  const xwoba = xwobaD > 0 ? xwobaN / xwobaD : 0;
  return { pa, hits, walks, woba, wrc_plus, xwoba };
}

/* ================================================================
   COMPRESSED X-AXIS (skip offseason gaps)
   ================================================================ */
function buildCompressedScale(allTimestamps) {
  const sorted = [...new Set(allTimestamps)].sort((a, b) => a - b);
  if (sorted.length < 2) return { scale: () => 0.5, ticks: sorted, breaks: [] };

  const MS_PER_DAY = 86400000;
  const MAX_GAP = 14;        // days — anything bigger gets compressed
  const COMPRESSED_GAP = 5;  // visual days for an offseason gap

  const positions = [0];
  const breaks = [];
  for (let i = 1; i < sorted.length; i++) {
    const gapDays = (sorted[i] - sorted[i - 1]) / MS_PER_DAY;
    if (gapDays > MAX_GAP) {
      positions.push(positions[i - 1] + COMPRESSED_GAP);
      breaks.push({
        frac: (positions[i - 1] + COMPRESSED_GAP / 2),
        yearAfter: new Date(sorted[i]).getFullYear(),
      });
    } else {
      positions.push(positions[i - 1] + gapDays);
    }
  }
  const total = positions[positions.length - 1] || 1;
  for (const b of breaks) b.frac /= total;

  const dataMonths = new Set();
  for (const t of sorted) {
    const d = new Date(t);
    dataMonths.add(d.getFullYear() * 100 + d.getMonth());
  }

  function scale(t) {
    let lo = 0, hi = sorted.length - 1;
    if (t <= sorted[0]) return 0;
    if (t >= sorted[hi]) return 1;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (sorted[mid] <= t) lo = mid; else hi = mid;
    }
    const frac = (t - sorted[lo]) / (sorted[hi] - sorted[lo] || 1);
    return (positions[lo] + frac * (positions[hi] - positions[lo])) / total;
  }

  return { scale, ticks: sorted, breaks, dataMonths };
}

function render() {

    : DATA.players.filter(p => (p.playerType || 'batter') === playerTypeFilter);
  const source = isTeam ? buildTeamRows(groupBy) : filteredPlayers;

  const currentYear = DATA.years_available[DATA.years_available.length - 1];

  const rows = [];
  const allTimestamps = [];
  for (const p of source) {
    if (isTeam) {
      const batEntity = { events: p.battingEvents };
      const pitEntity = { events: p.pitchingEvents };
      const { display: batDisplay, stats: batStats } = getEventsForEntity(batEntity, paCount);
      const { display: pitDisplay, stats: pitStats } = getEventsForEntity(pitEntity, paCount);
      if (batDisplay.length === 0 && pitDisplay.length === 0) continue;
      const batS = computeStats(batStats, false);
      const pitS = computeStats(pitStats, true);
      if (viewMode === 'pa') {
        const curSeasonPA = batDisplay.filter(e => parseInt(e[0].substring(0, 4)) === currentYear).length;
        if (curSeasonPA < minPA) continue;
      } else {
        if (batS.pa < minPA) continue;
      }
      if (q && !p.name.toLowerCase().includes(q)) continue;
      const bsrEntity = { events: p.baserunningEvents || [] };
      const fldEntity = { events: p.fieldingEvents || [] };
      const { display: bsrDisplay, stats: bsrStats } = getEventsForEntity(bsrEntity, paCount);
      const { display: fldDisplay, stats: fldStats } = getEventsForEntity(fldEntity, paCount);
      const batRAA = (batS.wrc_plus - 100) / 100 * curLC.lgRPA * batS.pa;
      const pitRAA = (pitS.wrc_plus - 100) / 100 * curLC.lgRPA * pitS.pa;
      const fldRunsFromEvts = fldStats.reduce((s, e) => s + (e[2] - curLC.lgwOBA), 0);
      const totalRAA = batRAA + pitRAA + (p.bsr ?? 0) + fldRunsFromEvts;
      const totalPA = batS.pa + pitS.pa;
      rows.push({
        ...p, ...batS,
        owrc_plus: pitS.wrc_plus,
        net_wrc_plus: totalPA > 0
          ? Math.round(100 + totalRAA / (curLC.lgRPA * totalPA) * 100)
          : null,
        pitching_xwoba: pitS.xwoba,
        pitching_pa: pitS.pa,
        _battingDisplayEvts: batDisplay,
        _battingStatEvts: batStats,
        _pitchingDisplayEvts: pitDisplay,
        _pitchingStatEvts: pitStats,
        _bsrDisplayEvts: bsrDisplay,
        _bsrStatEvts: bsrStats,
        _fldDisplayEvts: fldDisplay,
        _fldStatEvts: fldStats,
        _displayEvts: batDisplay,
        _statEvts: batStats,
        _paCount: paCount,
        isPitcher: false,
        isTeamRow: true,
      });
      for (const [d] of batDisplay) allTimestamps.push(new Date(d + 'T12:00:00').getTime());
      for (const [d] of pitDisplay) allTimestamps.push(new Date(d + 'T12:00:00').getTime());
      for (const [d] of bsrDisplay) allTimestamps.push(new Date(d + 'T12:00:00').getTime());
    } else {
      const { display, stats } = getEventsForEntity(p, paCount);
      if (display.length === 0) continue;
      const isPitcher = (p.playerType || 'batter') === 'pitcher';
      const s = computeStats(stats, isPitcher);
      if (viewMode === 'pa') {
        const curSeasonPA = display.filter(e => parseInt(e[0].substring(0, 4)) === currentYear).length;

      if (q && !p.name.toLowerCase().includes(q)) continue;
      rows.push({
        ...p, ...s,
        wrc_plus: isPitcher ? null : s.wrc_plus,
        owrc_plus: isPitcher ? s.wrc_plus : null,

/* ================================================================
   ZOOM
   ================================================================ */
function applyZoom() {
  document.getElementById('zoomLabel').textContent = chartZoom + 'x';
  const chartTh = document.querySelector('th.col-chart');
  const chartTds = document.querySelectorAll('td.col-chart');
  if (chartZoom === 1) {
    chartTh.style.minWidth = '';
    chartTds.forEach(td => { td.style.minWidth = ''; const c = td.querySelector('canvas'); if (c) c.style.width = '100%'; });
  } else {
    chartTh.style.minWidth = '';
    chartTds.forEach(td => { td.style.minWidth = ''; const c = td.querySelector('canvas'); if (c) c.style.width = '100%'; });
    const base = (chartTds[0]?.clientWidth || 600) - 20;
    const zoomedW = base * chartZoom;
    const zoomedColW = (zoomedW + 20) + 'px';
    chartTh.style.minWidth = zoomedColW;
    chartTds.forEach(td => {
      td.style.minWidth = zoomedColW;
      const c = td.querySelector('canvas'); if (c) c.style.width = zoomedW + 'px';
    });
  }
  drawAllCharts();
}

/* ================================================================
   CANVAS SCATTER CHARTS
   ================================================================ */
function drawAllCharts() {
  canvasMap.forEach((row, canvas) => {
    const td = canvas.parentElement;
    const cssW = td.clientWidth - 20;
    const cssH = row.isTeamRow ? 140 : 90;
    if (cssW <= 0) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = cssW * dpr;
    canvas.height = cssH * dpr;
    canvas.style.width  = cssW + 'px';
    canvas.style.height = cssH + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    if (row.isTeamRow) {
      drawTeamChart(ctx, canvas, row, cssW, cssH, row._paCount);
    } else {
      drawChart(ctx, canvas, row._displayEvts, row._statEvts, cssW, cssH, row._paCount, row.isPitcher, row._runsOffset);
    }
  });
}

const BAR_STACK_ORDER = [
  'caught_stealing',
  'strikeout','strikeout_double_play','field_out','force_out',
  'grounded_into_double_play','double_play','triple_play',
  'fielders_choice','fielders_choice_out','field_error',
  'sac_fly','sac_bunt','sac_fly_double_play','sac_bunt_double_play',
  'catcher_interf','other_out',
  'walk','intent_walk','hit_by_pitch',
  'single','double','triple','home_run',
  'stolen_base',
];

function drawChart(ctx, canvas, displayEvents, statEvents, w, h, paCount, isPitcher, runsOffset) {
  const pad = { top: 4, right: 30, bottom: 12, left: 6 };
  const pw = w - pad.left - pad.right;
  const ph = h - pad.top - pad.bottom;

  const xScale = t => pad.left + (1 - compressedX.scale(t)) * pw;
  const yScale = v => pad.top + ph - (v / yMax) * ph;
  const yScaleWrc = v => {
    const clamped = Math.max(WRC_PLUS_MIN, Math.min(WRC_PLUS_MAX, v));
    return pad.top + ph - ((clamped - WRC_PLUS_MIN) / (WRC_PLUS_MAX - WRC_PLUS_MIN)) * ph;
  };

  const MS_PER_DAY = 86400000;
  const sampleT = compressedX.ticks.length > 1 ? compressedX.ticks[0] : Date.now();
  const dayWidthPx = Math.abs(xScale(sampleT + MS_PER_DAY) - xScale(sampleT));

  // ── shared gridlines / labels ──────────────────────────────
  ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 0.5;
  for (const g of [0.691, 0.882, 1.252, 1.584]) {
    const gy = yScale(g);
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(w - pad.right, gy); ctx.stroke();
  }

  ctx.strokeStyle = '#c7c7cc'; ctx.lineWidth = 0.5; ctx.setLineDash([3, 3]);
  const y100 = yScaleWrc(100);
  ctx.beginPath(); ctx.moveTo(pad.left, y100); ctx.lineTo(w - pad.right, y100); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#9ca3af'; ctx.font = '8px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('100', w - pad.right + 3, y100 + 3);

  ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 0.7;
  const baseY = yScale(0);
  ctx.beginPath(); ctx.moveTo(pad.left, baseY); ctx.lineTo(w - pad.right, baseY); ctx.stroke();

  // ── season break lines ─────────────────────────────────────
  for (const brk of compressedX.breaks) {
    const bxPx = pad.left + (1 - brk.frac) * pw;
    ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 1; ctx.globalAlpha = 0.35;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(bxPx, pad.top); ctx.lineTo(bxPx, baseY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#6366f1'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(String(brk.yearAfter), bxPx, pad.top + 8);
    ctx.globalAlpha = 1;
  }

  // ── month labels (only for months with actual data) ───────
  ctx.fillStyle = '#b0b0b0'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dataMonths = compressedX.dataMonths || new Set();
  if (compressedX.ticks.length > 0) {
    const dStart = new Date(compressedX.ticks[0]);
    const dEnd = new Date(compressedX.ticks[compressedX.ticks.length - 1]);
    const multiYear = dEnd.getFullYear() - dStart.getFullYear() >= 1;
    const labeledMonths = new Set();
    let cur = new Date(dStart.getFullYear(), dStart.getMonth(), 15);
    while (cur <= dEnd) {
      const key = cur.getFullYear() * 100 + cur.getMonth();
      if (!labeledMonths.has(key) && dataMonths.has(key)) {
        const t = cur.getTime();
        const label = multiYear
          ? months[cur.getMonth()] + ' ' + String(cur.getFullYear()).slice(2)
          : months[cur.getMonth()];
        const xPos = xScale(t);
        if (xPos > pad.left + 10 && xPos < w - pad.right - 10) {
          ctx.fillText(label, xPos, h - 1);
        }
        labeledMonths.add(key);
      }
      cur.setMonth(cur.getMonth() + 1);
    }
  }

  // ── group events by date ───────────────────────────────────
  const byDate = new Map();
  for (const e of displayEvents) {
    const d = e[0];
    if (!byDate.has(d)) byDate.set(d, []);
    byDate.get(d).push(e);
  }
  for (const group of byDate.values()) group.sort((a, b) => a[3] - b[3]);

  // ── render events (scatter or stacked bar) ─────────────────
  const pts = [];
  const isSparse = runsOffset != null;
  if (chartType === 'bar') {
    const barW = isSparse ? Math.max(4, Math.min(dayWidthPx * 0.9, 12))
                          : Math.max(1, Math.min(dayWidthPx * 0.7, 8));
    for (const [dateStr, group] of byDate) {
      const t = new Date(dateStr + 'T12:00:00').getTime();
      const cx = xScale(t);
      const positive = group.filter(e => e[2] > 0);
      const negative = group.filter(e => e[2] < 0);
      if (positive.length === 0 && negative.length === 0) {
        pts.push({ x: cx, y: baseY, r: barW / 2 + 3, evt: 'field_out', date: dateStr, rv: 0 });
        continue;
      }
      positive.sort((a, b) => {
        const ai = BAR_STACK_ORDER.indexOf(a[1]);
        const bi = BAR_STACK_ORDER.indexOf(b[1]);
        return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
      });
      let curY = baseY;
      for (const e of positive) {
        const [, evt, rv] = e;
        const segH = (rv / yMax) * ph;
        const segTop = curY - segH;
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = EVENT_COLORS[evt] || OUT_COLOR;
        ctx.fillRect(cx - barW / 2, segTop, barW, segH);
        pts.push({ x: cx, y: segTop + segH / 2, r: barW / 2 + 3, evt, date: dateStr, rv });
        curY = segTop;
      }
      let curYDown = baseY;
      for (const e of negative) {
        const [, evt, rv] = e;
        const segH = (Math.abs(rv) / yMax) * ph;
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = EVENT_COLORS[evt] || OUT_COLOR;
        ctx.fillRect(cx - barW / 2, curYDown, barW, segH);
        pts.push({ x: cx, y: curYDown + segH / 2, r: barW / 2 + 3, evt, date: dateStr, rv });
        curYDown += segH;
      }
    }
    ctx.globalAlpha = 1;
  } else {
    const drawList = [];
    for (const [, group] of byDate) {
      const n = group.length;
      const spread = Math.min(dayWidthPx * 0.8, n * 3);
      group.forEach((e, i) => {
        const frac = n > 1 ? (i / (n - 1)) - 0.5 : 0;
        drawList.push({ e, xOff: frac * spread });
      });
    }
    drawList.sort((a, b) => a.e[2] - b.e[2]);
    for (const { e, xOff } of drawList) {
      const [dateStr, evt, rv] = e;
      const t = new Date(dateStr + 'T12:00:00').getTime();
      const x = xScale(t) + xOff;
      const rawY = yScale(rv);
      const y = Math.min(rawY, baseY + 8);
      const isOut = !EVENT_COLORS[evt];
      ctx.globalAlpha = isOut ? 0.45 : 0.8;
      ctx.fillStyle = EVENT_COLORS[evt] || OUT_COLOR;
      const dotR = isSparse ? 3.5 : 1.5;
      ctx.beginPath(); ctx.arc(x, y, dotR, 0, Math.PI * 2); ctx.fill();
      pts.push({ x, y, r: 5, evt, date: dateStr, rv });
    }
    ctx.globalAlpha = 1;
  }

  // ── Running wRC+ and xwOBA lines ─────────────────────────────
  const useRolling = viewMode === 'pa';
  const lineSource = useRolling ? displayEvents : statEvents;
  const chronological = [...lineSource].sort((a, b) => a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : a[3] - b[3]);

  let wobaNumer = 0, wobaDenom = 0;
  let xwobaNumer = 0, xwobaDenom = 0;
  let pfSum = 0, pfCount = 0;
  const win = [];
  const linePoints = [];
  const xLinePoints = [];

  for (const e of chronological) {
    const [dateStr, evt, rv, , , xw, stadium, hand] = e;
    const inDenom = !WOBA_DENOM_EXCLUDE.has(evt);
    const xVal = (xw != null && inDenom) ? xw : (inDenom ? rv : 0);
    const pf = getParkFactor(stadium, hand);
    win.push({ rv, inDenom, xVal, pf });
    wobaNumer += rv;
    xwobaNumer += xVal;
    if (inDenom) { wobaDenom++; xwobaDenom++; }
    pfSum += pf;
    pfCount++;

    if (useRolling) {
      while (win.length > paCount) {
        const old = win.shift();
        wobaNumer -= old.rv;
        xwobaNumer -= old.xVal;
        if (old.inDenom) { wobaDenom--; xwobaDenom--; }
        pfSum -= old.pf;
        pfCount--;
      }
    }

    const minPA = isSparse ? 1 : (useRolling ? Math.min(paCount, WRC_LINE_MIN_PA) : WRC_LINE_MIN_PA);
    if (win.length >= minPA && wobaDenom > 0) {
      const t = new Date(dateStr + 'T12:00:00').getTime();
      const x = xScale(t);

      const meanPF = pfCount > 0 ? pfSum / pfCount : 1.0;
      const woba = wobaNumer / wobaDenom;
      const wraaPerPa = (woba - curLC.lgwOBA) / curLC.wOBAScale;
      let wrcPlus = ((wraaPerPa + curLC.lgRPA + (curLC.lgRPA - meanPF * curLC.lgRPA)) / curLC.lgRPA) * 100;
      if (isPitcher) wrcPlus = 200 - wrcPlus;
      linePoints.push({ x, y: yScaleWrc(wrcPlus), wrcPlus, paNum: win.length, date: dateStr });

      if (!isSparse) {
        const xw2 = xwobaNumer / xwobaDenom;
        const xWraa = (xw2 - curLC.lgwOBA) / curLC.wOBAScale;
        let xWrcPlus = ((xWraa + curLC.lgRPA) / curLC.lgRPA) * 100;
        if (isPitcher) xWrcPlus = 200 - xWrcPlus;
        xLinePoints.push({ x, y: yScaleWrc(xWrcPlus), xwoba: xw2, xWrcPlus, paNum: win.length, date: dateStr });
      }
    }
  }

  if (linePoints.length > 1) {
    ctx.beginPath();
    ctx.moveTo(linePoints[0].x, linePoints[0].y);
    for (let i = 1; i < linePoints.length; i++) ctx.lineTo(linePoints[i].x, linePoints[i].y);
    ctx.strokeStyle = WRC_LINE_COLOR; ctx.lineWidth = isSparse ? 2 : 1.5; ctx.globalAlpha = 0.7;
    ctx.stroke(); ctx.globalAlpha = 1;
  }
  if (xLinePoints.length > 1) {
    ctx.beginPath();
    ctx.moveTo(xLinePoints[0].x, xLinePoints[0].y);
    for (let i = 1; i < xLinePoints.length; i++) ctx.lineTo(xLinePoints[i].x, xLinePoints[i].y);
    ctx.strokeStyle = XWOBA_LINE_COLOR; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.7;
    ctx.setLineDash([4, 3]);
    ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha = 1;
  }

  pointsMap.set(canvas, pts);
  lineMap.set(canvas, linePoints);
  xLineMap.set(canvas, xLinePoints);
}

/* ================================================================
   TEAM BUTTERFLY CHART
   ================================================================ */
function drawTeamChart(ctx, canvas, row, w, h, paCount) {
  const batDisplay = row._battingDisplayEvts;
  const pitDisplay = row._pitchingDisplayEvts;
  const batStats = row._battingStatEvts;
  const pitStats = row._pitchingStatEvts;

  const pad = { top: 4, right: 30, bottom: 12, left: 6 };
  const pw = w - pad.left - pad.right;
  const ph = h - pad.top - pad.bottom;
  const xScale = t => pad.left + (1 - compressedX.scale(t)) * pw;
  const yScaleWrc = v => {
    const clamped = Math.max(WRC_PLUS_MIN, Math.min(WRC_PLUS_MAX, v));
    return pad.top + ph - ((clamped - WRC_PLUS_MIN) / (WRC_PLUS_MAX - WRC_PLUS_MIN)) * ph;
  };

  const midY = yScaleWrc(100);
  const halfUp = midY - pad.top;
  const halfDown = (pad.top + ph) - midY;

  const MS_PER_DAY = 86400000;
  const sampleT = compressedX.ticks.length > 1 ? compressedX.ticks[0] : Date.now();
  const dayWidthPx = Math.abs(xScale(sampleT + MS_PER_DAY) - xScale(sampleT));

  // ── midline at 100 wRC+ ──
  ctx.strokeStyle = '#d1d5db'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.left, midY); ctx.lineTo(w - pad.right, midY); ctx.stroke();
  ctx.fillStyle = '#9ca3af'; ctx.font = '8px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('100', w - pad.right + 3, midY + 3);

  // ── season breaks ──
  for (const brk of compressedX.breaks) {
    const bxPx = pad.left + (1 - brk.frac) * pw;
    ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 1; ctx.globalAlpha = 0.35;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(bxPx, pad.top); ctx.lineTo(bxPx, pad.top + ph); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#6366f1'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(String(brk.yearAfter), bxPx, pad.top + 8);
    ctx.globalAlpha = 1;
  }

  // ── month labels ──
  ctx.fillStyle = '#b0b0b0'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dataMonths = compressedX.dataMonths || new Set();
  if (compressedX.ticks.length > 0) {
    const dStart = new Date(compressedX.ticks[0]);
    const dEnd = new Date(compressedX.ticks[compressedX.ticks.length - 1]);
    const multiYear = dEnd.getFullYear() - dStart.getFullYear() >= 1;
    const labeledMonths = new Set();
    let cur = new Date(dStart.getFullYear(), dStart.getMonth(), 15);
    while (cur <= dEnd) {
      const key = cur.getFullYear() * 100 + cur.getMonth();
      if (!labeledMonths.has(key) && dataMonths.has(key)) {
        const t = cur.getTime();
        const label = multiYear ? monthNames[cur.getMonth()] + ' ' + String(cur.getFullYear()).slice(2) : monthNames[cur.getMonth()];
        const xPos = xScale(t);
        if (xPos > pad.left + 10 && xPos < w - pad.right - 10) ctx.fillText(label, xPos, h - 1);
        labeledMonths.add(key);
      }
      cur.setMonth(cur.getMonth() + 1);
    }
  }

  // ── sum positive run values per date (single bar per date) ──
  function sumByDate(events) {
    const m = new Map();
    for (const e of events) { if (e[2] > 0) m.set(e[0], (m.get(e[0]) || 0) + e[2]); }
    return m;
  }
  const batSums = sumByDate(batDisplay);
  const pitSums = sumByDate(pitDisplay);

  const pts = [];
  const barW = Math.max(1, Math.min(dayWidthPx * 0.7, 8));

  // ── batting bars (up from midline, single color) ──
  for (const [dateStr, totalRV] of batSums) {
    const t = new Date(dateStr + 'T12:00:00').getTime();
    const cx = xScale(t);
    const segH = (totalRV / yMax) * halfUp;
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = WRC_LINE_COLOR;
    ctx.fillRect(cx - barW / 2, midY - segH, barW, segH);
    pts.push({ x: cx, y: midY - segH / 2, r: barW / 2 + 3, evt: 'hitting', date: dateStr, rv: totalRV, side: 'bat' });
  }

  // ── pitching bars (down from midline, single color) ──
  for (const [dateStr, totalRV] of pitSums) {
    const t = new Date(dateStr + 'T12:00:00').getTime();
    const cx = xScale(t);
    const segH = (totalRV / yMax) * halfDown;
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = OWRC_LINE_COLOR;
    ctx.fillRect(cx - barW / 2, midY, barW, segH);
    pts.push({ x: cx, y: midY + segH / 2, r: barW / 2 + 3, evt: 'pitching', date: dateStr, rv: totalRV, side: 'pit' });
  }
  ctx.globalAlpha = 1;

  // ── compute running lines (wRC+ and xwRC+) for each side ──
  function computeRunningLine(events, invert) {
    const useRolling = viewMode === 'pa';
    const chron = [...events].sort((a, b) => a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : a[3] - b[3]);
    let wN = 0, wD = 0, xN = 0, xD = 0, pS = 0, pC = 0;
    const win = [], points = [];
    for (const e of chron) {
      const [dateStr, evt, rv, , , xw, stadium, hand] = e;
      const inD = !WOBA_DENOM_EXCLUDE.has(evt);
      const xVal = (xw != null && inD) ? xw : (inD ? rv : 0);
      const pf = getParkFactor(stadium, hand);
      win.push({ rv, inD, xVal, pf });
      wN += rv; xN += xVal; if (inD) { wD++; xD++; } pS += pf; pC++;
      if (useRolling) {
        while (win.length > paCount) {
          const old = win.shift();
          wN -= old.rv; xN -= old.xVal; if (old.inD) { wD--; xD--; } pS -= old.pf; pC--;
        }
      }
      const minP = useRolling ? Math.min(paCount, WRC_LINE_MIN_PA) : WRC_LINE_MIN_PA;
      if (win.length >= minP && wD > 0) {
        const t = new Date(dateStr + 'T12:00:00').getTime();
        const x = xScale(t);
        const meanPF = pC > 0 ? pS / pC : 1.0;
        const woba = wN / wD;
        const wraaPerPa = (woba - curLC.lgwOBA) / curLC.wOBAScale;
        let wrcPlus = ((wraaPerPa + curLC.lgRPA + (curLC.lgRPA - meanPF * curLC.lgRPA)) / curLC.lgRPA) * 100;
        if (invert) wrcPlus = 200 - wrcPlus;
        let xWrcPlus = null;
        if (xD > 0) {
          const xw2 = xN / xD;
          const xWraa = (xw2 - curLC.lgwOBA) / curLC.wOBAScale;
          xWrcPlus = ((xWraa + curLC.lgRPA) / curLC.lgRPA) * 100;
          if (invert) xWrcPlus = 200 - xWrcPlus;
        }
        points.push({ x, date: dateStr, wrcPlus, xWrcPlus, paNum: win.length });
      }
    }
    return points;
  }

  const batLine = computeRunningLine(viewMode === 'pa' ? batDisplay : batStats, false);
  const pitLine = computeRunningLine(viewMode === 'pa' ? pitDisplay : pitStats, true);

  // ── merge into net wRC+ and net xwRC+ lines ──
  const batByDate2 = new Map(); for (const p of batLine) batByDate2.set(p.date, p);
  const pitByDate2 = new Map(); for (const p of pitLine) pitByDate2.set(p.date, p);
  const allLineDates = [...new Set([...batLine.map(p => p.date), ...pitLine.map(p => p.date)])].sort();

  let lastBat = null, lastPit = null;
  const netWrcLine = [], netXwrcLine = [];
  for (const date of allLineDates) {
    if (batByDate2.has(date)) lastBat = batByDate2.get(date);
    if (pitByDate2.has(date)) lastPit = pitByDate2.get(date);
    if (!lastBat || !lastPit) continue;
    const x = (batByDate2.has(date) ? batByDate2.get(date) : pitByDate2.get(date)).x;
    const totalPA = lastBat.paNum + lastPit.paNum;
    const netWrc = (lastBat.wrcPlus + lastPit.wrcPlus) / 2;
    netWrcLine.push({ x, y: yScaleWrc(netWrc), wrcPlus: netWrc, paNum: totalPA, date });
    if (lastBat.xWrcPlus != null && lastPit.xWrcPlus != null) {
      const netXwrc = (lastBat.xWrcPlus + lastPit.xWrcPlus) / 2;
      netXwrcLine.push({ x, y: yScaleWrc(netXwrc), xWrcPlus: netXwrc, paNum: totalPA, date });
    }
  }

  if (netWrcLine.length > 1) {
    ctx.beginPath(); ctx.moveTo(netWrcLine[0].x, netWrcLine[0].y);
    for (let i = 1; i < netWrcLine.length; i++) ctx.lineTo(netWrcLine[i].x, netWrcLine[i].y);
    ctx.strokeStyle = WRC_LINE_COLOR; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.7;
    ctx.stroke(); ctx.globalAlpha = 1;
  }
  if (netXwrcLine.length > 1) {
    ctx.beginPath(); ctx.moveTo(netXwrcLine[0].x, netXwrcLine[0].y);
    for (let i = 1; i < netXwrcLine.length; i++) ctx.lineTo(netXwrcLine[i].x, netXwrcLine[i].y);
    ctx.strokeStyle = XWOBA_LINE_COLOR; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.7;
    ctx.setLineDash([4, 3]);
    ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha = 1;
  }

  // ── side labels ──
  ctx.font = '8px sans-serif'; ctx.globalAlpha = 0.6;
  ctx.fillStyle = WRC_LINE_COLOR; ctx.textAlign = 'right';
  ctx.fillText('Hitting ▲', w - pad.right - 2, pad.top + 10);
  ctx.fillStyle = OWRC_LINE_COLOR;
  ctx.fillText('Pitching ▼', w - pad.right - 2, h - pad.bottom - 4);
  ctx.globalAlpha = 1;

  pointsMap.set(canvas, pts);
  lineMap.set(canvas, netWrcLine.map(lp => ({ ...lp, type: 'net-wrc' })));
  xLineMap.set(canvas, netXwrcLine.map(lp => ({ ...lp, type: 'net-xwrc' })));
}

document.addEventListener('mousemove', e => {
  const canvas = e.target.closest?.('canvas');
  if (!canvas || !pointsMap.has(canvas)) { tooltip.style.opacity = 0; return; }

  const rowData = canvasMap.get(canvas);
  const isPitcherRow = rowData?.isPitcher;

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const pts = pointsMap.get(canvas);
  let best = null, bestDist = 12;
  for (const p of pts) {
    const d = Math.hypot(mx - p.x, my - p.y);
    if (d < bestDist) { bestDist = d; best = p; }
  }

  const allLines = [
    ...(lineMap.get(canvas) || []).map(lp => ({ type: 'wrc', ...lp })),
    ...(xLineMap.get(canvas) || []).map(lp => ({ type: 'xwoba', ...lp })),
  ];
  let bestLine = null, bestLineDist = 8;
  for (const lp of allLines) {
    const dx = Math.abs(mx - lp.x);
    const dy = Math.abs(my - lp.y);
    if (dx < 6 && dy < 14) {
      const d = Math.hypot(dx, dy * 0.4);
      if (d < bestLineDist) { bestLineDist = d; bestLine = lp; }
    }
  }

  if (best && bestDist <= (bestLine ? bestLineDist : 12)) {
    tooltip.style.opacity = 1;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
    const evtLabel = best.evt === 'hitting' ? 'Hitting'
      : best.evt === 'pitching' ? 'Pitching'
      : best.side === 'pit' ? `${PRETTY[best.evt] || best.evt} (allowed)`
      : (PRETTY[best.evt] || best.evt);
    tooltip.innerHTML = `<strong>${evtLabel}</strong><br>` +
      `${best.date} · Run value ${best.rv.toFixed(3)}`;
  } else if (bestLine) {
    tooltip.style.opacity = 1;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
    const windowLabel = viewMode === 'pa' ? ` (last ${bestLine.paNum} PA)` : ` · After ${bestLine.paNum} PA`;
    if (bestLine.type === 'net-wrc') {
      tooltip.innerHTML = `<strong>Net wRC+ ${Math.round(bestLine.wrcPlus)}</strong><br>` +
        `${bestLine.date}${windowLabel}`;
    } else if (bestLine.type === 'net-xwrc') {
      tooltip.innerHTML = `<strong>Net xwRC+ ${Math.round(bestLine.xWrcPlus)}</strong><br>` +
        `${bestLine.date}${windowLabel}`;
    } else if (bestLine.type === 'xwoba') {
      const xLabel = isPitcherRow ? 'oWRC+' : 'xwRC+';
      tooltip.innerHTML = `<strong>xwOBA ${bestLine.xwoba.toFixed(3)}</strong> (${xLabel} ${Math.round(bestLine.xWrcPlus)})<br>` +
        `${bestLine.date}${windowLabel}`;
    } else if (bestLine.type === 'owrc') {
      tooltip.innerHTML = `<strong>oWRC+ ${Math.round(bestLine.wrcPlus)}</strong><br>` +
        `${bestLine.date}${windowLabel}`;
    } else {
      const wLabel = isPitcherRow ? 'oWRC+' : 'wRC+';
      tooltip.innerHTML = `<strong>${wLabel} ${Math.round(bestLine.wrcPlus)}</strong><br>` +
        `${bestLine.date}${windowLabel}`;
    }
  } else {
    tooltip.style.opacity = 0;
  }
});

/* ── Resize handler ──────────────────────────────────────────── */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (DATA) render(); }, 150);
});
</script>
</body>
</html>
